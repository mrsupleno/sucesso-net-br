<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Workspace - Email Profissional | Sucesso Empresarial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .email-input-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 5px 15px;
            transition: all 0.3s;
        }
        .email-input-wrapper:focus-within {
            border-color: #667eea;
        }
        .email-input-wrapper input {
            flex: 1;
            border: none;
            padding: 7px 0;
            font-size: 16px;
        }
        .domain {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
        }
        .status-message {
            padding: 12px 15px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            font-size: 14px;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .renewal-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .renewal-box h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        .renewal-box p {
            color: #856404;
            line-height: 1.6;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email Profissional Google Workspace</h1>
        <p class="subtitle">Crie seu email profissional @mais.top</p>
        
        <div id="renewalBox" class="renewal-box">
            <h3>⚠️ Renovação de Assinatura</h3>
            <p id="renewalMessage"></p>
        </div>
        
        <form id="saleForm">
            <div class="form-group">
                <label for="name">Nome Completo:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email de Contato:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Celular/WhatsApp:</label>
                <input type="tel" id="phone" name="phone" required placeholder="(27) 98112-5528">
            </div>
            
            <div class="form-group">
                <label for="username">Escolha seu Email Profissional:</label>
                <div class="email-input-wrapper">
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="seuusername"
                        autocomplete="off"
                        required
                    >
                    <span class="domain">@mais.top</span>
                </div>
                <div id="statusMessage" class="status-message"></div>
            </div>
            
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <span id="btnText">Continuar para Pagamento →</span>
            </button>
        </form>
    </div>
    
    <script>
        const form = document.getElementById('saleForm');
        const usernameInput = document.getElementById('username');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const statusMessage = document.getElementById('statusMessage');
        const renewalBox = document.getElementById('renewalBox');
        const renewalMessage = document.getElementById('renewalMessage');
        
        let checkResult = null;
        let lastCheckedUsername = '';
        
        // Debounce para verificação automática
        let checkTimeout;
        usernameInput.addEventListener('input', () => {
            clearTimeout(checkTimeout);
            checkResult = null;
            statusMessage.style.display = 'none';
            renewalBox.style.display = 'none';
            
            const username = usernameInput.value.trim().toLowerCase();
            
            if (username.length >= 3) {
                checkTimeout = setTimeout(() => checkEmail(username), 800);
            }
        });
        
        async function checkEmail(username) {
            if (!username || !/^[a-z0-9.-]+$/.test(username)) {
                showStatus('error', 'Use apenas letras, números, pontos e hífens');
                return;
            }
            
            if (username === lastCheckedUsername) return;
            lastCheckedUsername = username;
            
            showStatus('info', '🔍 Verificando disponibilidade...');
            
            try {
                const response = await fetch('https://api.sucesso.net.br/api/check-pre-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, domain: 'mais.top'})
                });
                
                checkResult = await response.json();
                
                if (checkResult.type === 'new') {
                    // Email disponível - CONTA NOVA
                    showStatus('success', `✅ ${checkResult.email} está disponível!`);
                    btnText.textContent = 'Assinar e Criar Conta →';
                    renewalBox.style.display = 'none';
                    
                } else if (checkResult.type === 'renewal') {
                    // Email já existe - RENOVAÇÃO
                    showStatus('warning', `⚠️ Você já possui a conta ${checkResult.email}`);
                    renewalBox.style.display = 'block';
                    renewalMessage.textContent = `Você já possui uma conta ${checkResult.email}. Deseja renovar sua assinatura? Seus dados e senha permanecerão os mesmos.`;
                    btnText.textContent = 'Sim, Renovar Minha Assinatura →';
                    
                } else if (checkResult.type === 'migration') {
                    // Email existe mas não está no Asaas - MIGRAÇÃO
                    showStatus('warning', `⚠️ Você já possui a conta ${checkResult.email}`);
                    renewalBox.style.display = 'block';
                    renewalMessage.textContent = `Você já possui a conta ${checkResult.email}. Vamos vincular ao sistema de pagamentos automáticos. Sua senha permanecerá a mesma.`;
                    btnText.textContent = 'Vincular e Assinar →';
                }
                
            } catch (error) {
                showStatus('error', 'Erro ao verificar. Tente novamente.');
                checkResult = null;
            }
        }
        
        function showStatus(type, message) {
            statusMessage.className = `status-message status-${type}`;
            statusMessage.textContent = message;
            statusMessage.style.display = 'block';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim().toLowerCase();
            
            // Verificar novamente antes de prosseguir
            if (username !== lastCheckedUsername) {
                await checkEmail(username);
            }
            
            if (!checkResult) {
                showStatus('error', 'Verifique o email antes de continuar');
                return;
            }
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                username: username,
                workspace_email: checkResult.email,
                type: checkResult.type,
                customer_id: checkResult.customer_id || null
            };
            
            // Aqui você redirecionaria para o Asaas com esses dados
            // Por exemplo, criando um link de pagamento customizado
            
            submitBtn.disabled = true;
            btnText.innerHTML = 'Redirecionando... <div class="loader"></div>';
            
            // Simular redirecionamento
            console.log('Dados para Asaas:', formData);
            
            // TODO: Integrar com Asaas para criar link de pagamento
            // com metadata contendo type, username, etc.
            
            setTimeout(() => {
                alert('Aqui você seria redirecionado para o pagamento no Asaas com os dados: ' + JSON.stringify(formData, null, 2));
                submitBtn.disabled = false;
                btnText.textContent = 'Continuar para Pagamento →';
            }, 2000);
        });
    </script>
</body>
</html>
